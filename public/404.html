<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Boutique E-commerce</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string,
      // converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which will cause the browser to stay on the current page.
      var l = window.location;
      if (l.search[1] === '/' ) {
        var decoded = l.search.slice(1).split('&').map(function(s) { 
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    </script>
  </head>
  <body>
    <script>
      // If it's a 404, redirect to index.html with the current path in the query string
      var path = window.location.pathname;
      window.location.replace('/?/' + path.split('/').filter(Boolean).join('/') + window.location.search + window.location.hash);
    </script>
  </body>
</html>
